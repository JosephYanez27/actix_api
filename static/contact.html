<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solid Software</title>

    <link rel="icon" type="image/png" sizes="32x32" href="images/cub_blan.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/cub_blan.png">
    
    <link rel="apple-touch-icon" href="images/cub_blan.png">

    <link rel="stylesheet" href="styles.css">
    <style>
.btn-group {
  display: flex;
  gap: 12px;
  margin-top: 15px;
}

button, .btn-cancel {
  padding: 10px 18px;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  transition: 0.3s ease;
}

/* Botón Guardar */
.btn-save {
  background: #28a745;
  color: white;
  border: none;
}

.btn-save:hover {
  background: #218838;
}

/* Botón Cancelar */
.btn-cancel {
  background: #dc3545;
  color: white;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.btn-cancel:hover {
  background: #c82333;
}
</style>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>

<nav class="menu">
  <div class="menu-container">
    <div class="logo-box">
      <img src="images/sl.png" alt="Solid Software">
    </div>

    <ul class="menu-links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="services.html">Servicios</a></li>
      <li><a href="about.html">Nosotros</a></li>
      <li><a href="contact.html">Contacto</a></li>
       <li><a href="registros.html">AdminPanel</a></li>
    </ul>
  </div>
</nav>

<nav class="breadcrumbs">
  <a href="index.html">Inicio</a>
  <span>›</span>
  <span>Contacto</span>
</nav>



<section id="contact" class="section active">

<h2>Contacto</h2>

<form id="myForm" novalidate>

  <div class="field">
    <input type="text" name="nombre" placeholder="Nombre" maxlength="25" required>
    <small>Solo letras mínimo 3-maximo 25</small>
  </div>

  <div class="field">
    <input type="email" name="correo" placeholder="Correo" required>
    <small>Formato válido: ejemplo@mail.com</small>
  </div>

  <div class="field">
    <input type="tel" name="telefono" placeholder="Teléfono" maxlength="10" required>
    <small>10 números</small>
  </div>

  <div class="field">
    <textarea 
      name="mensaje" 
      id="mensaje"
      placeholder="Escribe tu mensaje..."
      required
      minlength="10"
      maxlength="300"
    ></textarea>
    <small id="msgHelp">10 a 300 caracteres.</small>
  </div>

  <div class="g-recaptcha" data-sitekey="6LdLfm8sAAAAALAmDsmhIBQ9sT6758MrIZ7Fm4eA"></div>

  <div class="btn-group">
    <button type="submit" class="btn-save">Guardar</button>
    <a href="registros.html" class="btn-cancel">Cancelar</a>
  </div>

  <p id="msg"></p>
</form>

</section>

<script src="captcha.js"></script>
<script src="validation.js"></script>
<script src="breadcrumbs.js"></script>

<script>
function showSection(id) {

  document.querySelectorAll(".section")
    .forEach(s => s.classList.remove("active"));

  const section = document.getElementById(id);

  if (!section) return;

  section.classList.add("active");

  // 🧭 actualizar breadcrumb
  updateBreadcrumb(id);
}
</script>
<script>
function showSection(id) {
  document.querySelectorAll(".section")
    .forEach(s => s.classList.remove("active"));

  document.getElementById(id).classList.add("active");
}
</script>
<script>
const menuContainer = document.querySelector(".menu-container");
const menu = document.querySelector(".menu-links");

// Crear botón hamburguesa dinámicamente
const toggle = document.createElement("div");
toggle.classList.add("menu-toggle");
toggle.innerHTML = "<span></span><span></span><span></span>";

menuContainer.appendChild(toggle);

// Evento
toggle.addEventListener("click", () => {
  menu.classList.toggle("active");
  toggle.classList.toggle("active");
});
</script>
</body>
</html>
